name: WebdriverIO Test Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json presence
        run: ls -la

      - name: Run WebdriverIO tests
        run: npm test
        with:
          name: test-reports
          path: ./test-results/  # Adjust this path if your test reports are stored elsewhere
