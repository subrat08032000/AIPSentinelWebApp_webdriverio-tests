name: WebdriverIO Test Suite

on:
  push:
    branches:
      - main
      - new-branch
  pull_request:
    branches:
      - main
      - new-branch

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MOCHA_TIMEOUT: 180000   # Increase Mocha test timeout to 3 minutes

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run WebdriverIO tests with increased timeout
        run: npm run wdio -- --timeout 180000
