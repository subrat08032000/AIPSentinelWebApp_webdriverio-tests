name: WebdriverIO Test Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Check current directory and files
        run: |
          pwd
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json existence and scripts
        run: cat package.json

      - name: Run WebdriverIO tests
        run: npm run wdio
