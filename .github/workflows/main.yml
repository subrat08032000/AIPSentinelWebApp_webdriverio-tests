name: WebdriverIO Test Suite

on:
  push:
    branches:
      - main
      - new-branch
  pull_request:
    branches:
      - main
      - new-branch

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MOCHA_TIMEOUT: 120000   # Increase Mocha test case timeout to 2 minutes

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run WebdriverIO tests with increased timeout
        run: npm run wdio -- --timeout 120000

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: ./test-results/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: logs
          path: ./log/
